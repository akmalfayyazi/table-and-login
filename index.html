<!DOCTYPE html>
<html>
<head>
<style>
        table {
        width: 40%;
        border-collapse: collapse;
        margin: 100px auto;
    }
    th, td {
        border: 1px solid #000;
        padding: 20px;
        text-align: left;
        font-size: 30px;
    }
    th {
        background-color: #385fe9;
        color: #ffffff;
        text-align: center;
    }
    td {
        color: #000000;
    }
  .login-box {
    width: 400px;
    border: 1px solid #ccc;
    padding: 20px;
    font-family: Arial;
    
    transform: scale(2); /* perbesar 1.3x */
    transform-origin: top left;
  }

  .login-box h2 {
    margin-top: 0;
  }

  .login-box input[type="text"],
  .login-box input[type="password"] {
    width: 70%;
    padding: 5px;
    margin: 5px 0 10px 0;
  }

  .login-box input[type="submit"] {
    padding: 5px 15px;
  }
</style>
</head>
<body>

<table>
    <tr>
        <th rowspan="2">Nama</th>
        <th colspan="3">Nilai</th>
    </tr>
    <tr>
        <th>Kimia</th>
        <th>Fisika</th>
        <th>Biologi</th>
    </tr>
    <tr>
        <td>Robby</td>
        <td>76</td>
        <td>80</td>
        <td>81</td>
    </tr>
    <tr>
        <td>Rendi</td>
        <td>84</td>
        <td>70</td>
        <td>75</td>
    </tr>
    <tr>
        <td>Alfian</td>
        <td>96</td>
        <td>70</td>
        <td>71</td>
    </tr>
</table>

<div class="login-box">
  <h2>Login</h2>

  Username:
  <input type="text" value="petanikode"><br>

  Password:
  <input type="password" value="password"><br>

  <input type="checkbox"> Remember me <br><br>

  <input type="submit" value="Login">
</div>

</body>
</html>
